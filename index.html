<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>Range Data Collector</title>
    <style>
        :root { --bg: #f4f4f9; --primary: #0056b3; --success: #28a745; --text: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 15px; max-width: 500px; margin: auto; }
        h2, h3 { text-align: center; margin-top: 0; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background: #004494; }
        .btn-danger { background: #dc3545; margin-top: 20px; }
        
        /* List Styles */
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 8px 0; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 500; cursor: pointer; border-left: 5px solid #ccc; }
        li.completed { border-left-color: var(--success); background: #e6f8ea; text-decoration: line-through; color: #555; }
        
        #cameraInput { display: none; }
    </style>
</head>
<body>

    <h2>Range Data Collector</h2>

    <div class="card">
        <label><b>Training Topic (Naming Convention)</b></label>
        <input type="text" id="topicInput" placeholder="e.g., WepQual, Sustainment" onchange="saveData()">
    </div>

    <div class="card">
        <label><b>Add Personnel</b></label>
        <input type="number" id="badgeInput" placeholder="Badge Number">
        <input type="text" id="nameInput" placeholder="Last Name, First Name">
        <button onclick="addPerson()">+ Add to Roster</button>
    </div>

    <div class="card">
        <h3>Today's Roster</h3>
        <p style="font-size: 12px; text-align: center; color: #666;">Tap a name to launch camera.</p>
        <ul id="rosterList"></ul>
    </div>

    <button class="btn-danger" onclick="clearRoster()">Clear All Data (End of Day)</button>

    <input type="file" accept="image/*" capture="environment" id="cameraInput">

    <script>
        let roster = [];
        let currentSelectedId = null;

        // --- 1. Load Data on Startup ---
        window.onload = function() {
            const savedRoster = localStorage.getItem('rangeRoster');
            const savedTopic = localStorage.getItem('rangeTopic');
            
            if (savedRoster) roster = JSON.parse(savedRoster);
            if (savedTopic) document.getElementById('topicInput').value = savedTopic;
            
            renderRoster();
        };

        // --- 2. Save Data ---
        function saveData() {
            localStorage.setItem('rangeRoster', JSON.stringify(roster));
            localStorage.setItem('rangeTopic', document.getElementById('topicInput').value);
        }

        // --- 3. Add Person ---
        function addPerson() {
            const badge = document.getElementById('badgeInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            
            if (!badge || !name) return alert("Enter both Badge and Name!");

            // Format for filename: 10267_Reyes, Jacob
            const formattedString = badge + "_" + name; 
            
            roster.push({ id: Date.now(), textString: formattedString, completed: false });
            
            document.getElementById('badgeInput').value = '';
            document.getElementById('nameInput').value = '';
            
            saveData();
            renderRoster();
        }

        // --- 4. Render the List ---
        function renderRoster() {
            const listEl = document.getElementById('rosterList');
            listEl.innerHTML = ''; // Clear current list

            roster.forEach(person => {
                const li = document.createElement('li');
                li.innerText = person.textString + (person.completed ? ' ✅' : ' 📸');
                if (person.completed) li.className = 'completed';
                
                li.onclick = () => triggerCamera(person.id);
                listEl.appendChild(li);
            });
        }

        // --- 5. Trigger Camera ---
        function triggerCamera(id) {
            currentSelectedId = id;
            document.getElementById('cameraInput').click();
        }

        // --- 6. Handle Photo Capture & Rename ---
        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !currentSelectedId) return;

            const topic = document.getElementById('topicInput').value.trim() || "Training";
            
            // Find the person we selected
            const personIndex = roster.findIndex(p => p.id === currentSelectedId);
            const person = roster[personIndex];

            // Build Date String (YYYYMMDD)
            const d = new Date();
            const dateStr = d.getFullYear().toString() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');

            // Construct Final File Name
            const newFileName = person.textString + "_" + topic + "_" + dateStr + ".jpg";

            // Force Download to save the file
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url;
            a.download = newFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Mark as completed, save, and re-render
            roster[personIndex].completed = true;
            saveData();
            renderRoster();
            
            // Clear input for next photo
            e.target.value = '';
            currentSelectedId = null;
        });

        // --- 7. Clear Roster ---
        function clearRoster() {
            if(confirm("Are you sure? This deletes the roster for the next session.")) {
                roster = [];
                saveData();
                renderRoster();
            }
        }
    </script>
<div id="debugLog" style="background:#222; color:#0f0; padding:10px; margin-top:20px; font-family:monospace; font-size:12px; border-radius:5px;">
        SW Status: Booting...
    </div>

    <script>
        const debugLog = document.getElementById('debugLog');
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                debugLog.innerText = 'SW Status: Attempting Registration...';
                
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        debugLog.innerText = 'SW Status: SUCCESS! Scope is ' + reg.scope;
                    })
                    .catch(err => {
                        debugLog.innerText = 'SW Status: FAILED! ' + err.message;
                    });
            });
        } else {
            debugLog.innerText = 'SW Status: Service Workers not supported by this browser.';
        }
    </script>
</body>
</html>
</body>
</html>
